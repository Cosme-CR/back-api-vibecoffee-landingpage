openapi: 3.0.0
info:
  title: VibeCoffee-BackEnd-ADM API
  version: 1.0.0
  description: "Documenta\xE7\xE3o da API de backend administrativo para o sistema\
    \ VibeCoffee."
servers:
- url: http://localhost:8080/v1/vibecoffee
  description: Servidor de Desenvolvimento
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Autentica\xE7\xE3o JWT. Forne\xE7a o token no cabe\xE7alho x-access-token."
  schemas:
    Usuario:
      type: object
      required:
      - nome
      - usuario
      - senha
      properties:
        id:
          type: integer
          readOnly: true
          description: "ID do usu\xE1rio (gerado automaticamente)"
        nome:
          type: string
          maxLength: 100
          description: "Nome completo do usu\xE1rio"
        usuario:
          type: string
          maxLength: 100
          description: "Nome de usu\xE1rio para login"
        senha:
          type: string
          maxLength: 254
          description: "Senha do usu\xE1rio"
      example:
        nome: "Jo\xE3o Silva"
        usuario: joao.silva
        senha: senha123
    Login:
      type: object
      required:
      - usuario
      - senha
      properties:
        usuario:
          type: string
          description: "Nome de usu\xE1rio para login"
        senha:
          type: string
          description: "Senha do usu\xE1rio"
      example:
        usuario: joao.silva
        senha: senha123
    Produto:
      type: object
      required:
      - nome
      - descricao
      - foto
      - status
      - tipo_categoria
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do produto (gerado automaticamente)
        nome:
          type: string
          maxLength: 50
          description: Nome do produto
        descricao:
          type: string
          description: "Descri\xE7\xE3o detalhada do produto"
        foto:
          type: string
          maxLength: 254
          description: URL da foto do produto
        status:
          type: boolean
          description: Status do produto (ativo/inativo)
        tipo_categoria:
          type: array
          items:
            type: object
            required:
            - id_tipo_categoria
            - preco
            properties:
              id_tipo_categoria:
                type: integer
                description: "ID da rela\xE7\xE3o tipo-categoria"
              preco:
                type: number
                format: float
                description: "Pre\xE7o do produto para este tipo-categoria"
          description: "Lista de tipos de categoria associados ao produto com seus\
            \ pre\xE7os"
      example:
        nome: "Caf\xE9 Expresso"
        descricao: "Caf\xE9 forte e arom\xE1tico."
        foto: http://example.com/expresso.jpg
        status: true
        tipo_categoria:
        - id_tipo_categoria: 1
          preco: 5.5
        - id_tipo_categoria: 2
          preco: 7
    Categoria:
      type: object
      required:
      - categoria
      - tipo
      properties:
        id:
          type: integer
          readOnly: true
          description: ID da categoria (gerado automaticamente)
        categoria:
          type: string
          maxLength: 100
          description: Nome da categoria
        tipo:
          type: array
          items:
            type: object
            required:
            - id
            properties:
              id:
                type: integer
                description: "ID do tipo associado \xE0 categoria"
          description: Lista de IDs de tipos associados a esta categoria
      example:
        categoria: Bebidas Quentes
        tipo:
        - id: 1
        - id: 2
    Tipo:
      type: object
      required:
      - tipo
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do tipo (gerado automaticamente)
        tipo:
          type: string
          maxLength: 45
          description: "Nome do tipo (ex: Pequeno, M\xE9dio, Grande)"
      example:
        tipo: Pequeno
    Error:
      type: object
      properties:
        status:
          type: boolean
          example: false
        status_code:
          type: integer
          example: 400
        message:
          type: string
          example: "Requisi\xE7\xE3o inv\xE1lida"
        field:
          type: string
          example: "[NOME] inv\xE1lido"
    SuccessResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        status_code:
          type: integer
          example: 200
        message:
          type: string
          example: "Opera\xE7\xE3o realizada com sucesso!"
        response:
          type: object
          description: "Objeto de resposta contendo os dados da opera\xE7\xE3o."
    AuthSuccessResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        status_code:
          type: integer
          example: 200
        message:
          type: string
          example: "Opera\xE7\xE3o realizada com sucesso!"
        response:
          type: object
          description: Objeto de resposta vazio.
        token:
          type: string
          description: "Token JWT para autentica\xE7\xE3o."
